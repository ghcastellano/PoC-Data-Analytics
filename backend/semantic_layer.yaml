# ─── Semantic Layer: Business Context for AI Agents ───
# This file defines business metrics, dimensions, KPIs, and aliases
# that are injected into agent prompts for business-aware SQL generation.

metrics:
  revenue:
    display_name: "Revenue"
    column: "revenue"
    table: "monthly_metrics"
    format: "currency_usd"
    description: "Total revenue in USD"
    aggregation: "SUM"

  pipeline:
    display_name: "Pipeline"
    column: "pipeline"
    table: "monthly_metrics"
    format: "currency_usd"
    description: "Sales pipeline value in USD"
    aggregation: "SUM"

  gross_margin:
    display_name: "Gross Margin"
    column: "margin_pct"
    table: "monthly_metrics"
    format: "percentage"
    formula: "revenue * margin_pct / 100"
    description: "Gross margin percentage"
    aggregation: "AVG"

  utilization:
    display_name: "Utilization Rate"
    column: "utilization_pct"
    table: "monthly_metrics"
    format: "percentage"
    description: "Resource utilization percentage"
    aggregation: "AVG"

  nps:
    display_name: "Net Promoter Score"
    column: "nps_score"
    table: "monthly_metrics"
    format: "score"
    description: "Customer satisfaction NPS score (0-100)"
    aggregation: "AVG"

  headcount:
    display_name: "Headcount"
    column: "headcount"
    table: "monthly_metrics"
    format: "integer"
    description: "Number of employees"
    aggregation: "SUM"

  active_projects:
    display_name: "Active Projects"
    column: "active_projects"
    table: "monthly_metrics"
    format: "integer"
    description: "Number of active projects"
    aggregation: "SUM"

  new_deals:
    display_name: "New Deals"
    column: "new_deals"
    table: "monthly_metrics"
    format: "integer"
    description: "Number of new deals closed"
    aggregation: "SUM"

  churn_rate:
    display_name: "Churn Rate"
    column: "churn_rate"
    table: "monthly_metrics"
    format: "percentage"
    description: "Client churn rate percentage"
    aggregation: "AVG"

  avg_deal_size:
    display_name: "Average Deal Size"
    column: "avg_deal_size"
    table: "monthly_metrics"
    format: "currency_usd"
    description: "Average deal size in USD"
    aggregation: "AVG"

  pipeline_to_revenue:
    display_name: "Pipeline-to-Revenue Ratio"
    formula: "pipeline / NULLIF(revenue, 0)"
    format: "ratio"
    description: "Ratio of pipeline to revenue (healthy > 2.0)"

  revenue_per_head:
    display_name: "Revenue per Head"
    formula: "revenue / NULLIF(headcount, 0)"
    format: "currency_usd"
    description: "Revenue generated per employee"

dimensions:
  business_unit:
    display_name: "Business Unit"
    table: "business_units"
    key: "id"
    label: "name"
    hierarchy: ["region", "business_unit", "service_line"]
    members:
      - { id: 1, name: "Banking & Financial Services", code: "BFS" }
      - { id: 2, name: "Insurance", code: "INS" }
      - { id: 3, name: "Telco & Media", code: "TELCO" }

  service_line:
    display_name: "Service Line"
    table: "service_lines"
    key: "id"
    label: "name"
    members:
      - { id: 1, name: "Data & Analytics", code: "DA" }
      - { id: 2, name: "Cloud & Infrastructure", code: "CLOUD" }
      - { id: 3, name: "Application Development", code: "APPDEV" }
      - { id: 4, name: "AI & Intelligent Solutions", code: "AI" }
      - { id: 5, name: "Cybersecurity", code: "SEC" }

  period:
    display_name: "Period"
    table: "monthly_metrics"
    column: "period"
    type: "temporal"
    grain: "monthly"
    range: "2024-01-01 to 2025-12-31"

  project_status:
    display_name: "Project Status"
    table: "projects"
    column: "status"
    members: ["Active", "Completed", "Pipeline"]

kpi_targets:
  utilization:
    target: 85.0
    warning_threshold: 80.0
    critical_threshold: 75.0
    direction: "higher_is_better"

  margin_pct:
    target: 30.0
    warning_threshold: 25.0
    critical_threshold: 20.0
    direction: "higher_is_better"

  nps_score:
    target: 50.0
    warning_threshold: 40.0
    critical_threshold: 35.0
    direction: "higher_is_better"

  churn_rate:
    target: 3.0
    warning_threshold: 4.0
    critical_threshold: 5.0
    direction: "lower_is_better"

  pipeline_to_revenue_ratio:
    target: 2.5
    warning_threshold: 2.0
    critical_threshold: 1.5
    direction: "higher_is_better"

aliases:
  # Business Unit aliases
  "banking": "Banking & Financial Services"
  "bfs": "Banking & Financial Services"
  "finance": "Banking & Financial Services"
  "insurance": "Insurance"
  "ins": "Insurance"
  "telco": "Telco & Media"
  "telecom": "Telco & Media"
  "media": "Telco & Media"

  # Service Line aliases
  "data": "Data & Analytics"
  "d&a": "Data & Analytics"
  "analytics": "Data & Analytics"
  "cloud": "Cloud & Infrastructure"
  "infra": "Cloud & Infrastructure"
  "appdev": "Application Development"
  "development": "Application Development"
  "ai": "AI & Intelligent Solutions"
  "artificial intelligence": "AI & Intelligent Solutions"
  "security": "Cybersecurity"
  "cyber": "Cybersecurity"

  # Time aliases
  "last quarter": "Q4 2025 (period BETWEEN '2025-10-01' AND '2025-12-31')"
  "this quarter": "Q4 2025 (period BETWEEN '2025-10-01' AND '2025-12-31')"
  "q4": "Q4 2025 (period BETWEEN '2025-10-01' AND '2025-12-31')"
  "q3": "Q3 2025 (period BETWEEN '2025-07-01' AND '2025-09-30')"
  "q2": "Q2 2025 (period BETWEEN '2025-04-01' AND '2025-06-30')"
  "q1": "Q1 2025 (period BETWEEN '2025-01-01' AND '2025-03-31')"
  "this year": "2025 (period BETWEEN '2025-01-01' AND '2025-12-31')"
  "last year": "2024 (period BETWEEN '2024-01-01' AND '2024-12-31')"
  "ytd": "Year to date 2025 (period BETWEEN '2025-01-01' AND '2025-12-31')"
  "last 6 months": "period BETWEEN '2025-07-01' AND '2025-12-31'"
  "last 12 months": "period BETWEEN '2025-01-01' AND '2025-12-31'"

example_queries:
  - question: "What was our total revenue last quarter?"
    sql: "SELECT SUM(mm.revenue) AS total_revenue FROM monthly_metrics mm WHERE mm.period BETWEEN '2025-10-01' AND '2025-12-31'"

  - question: "Compare revenue by business unit"
    sql: "SELECT bu.name AS business_unit, ROUND(SUM(mm.revenue)::numeric, 2) AS total_revenue FROM monthly_metrics mm JOIN business_units bu ON mm.business_unit_id = bu.id GROUP BY bu.name ORDER BY total_revenue DESC"

  - question: "Revenue trend for Banking over last 12 months"
    sql: "SELECT mm.period, ROUND(SUM(mm.revenue)::numeric, 2) AS revenue FROM monthly_metrics mm JOIN business_units bu ON mm.business_unit_id = bu.id WHERE bu.name = 'Banking & Financial Services' AND mm.period >= '2025-01-01' GROUP BY mm.period ORDER BY mm.period ASC"

  - question: "Which service line has the highest utilization?"
    sql: "SELECT sl.name AS service_line, ROUND(AVG(mm.utilization_pct)::numeric, 2) AS avg_utilization FROM monthly_metrics mm JOIN service_lines sl ON mm.service_line_id = sl.id WHERE mm.period >= '2025-10-01' GROUP BY sl.name ORDER BY avg_utilization DESC"
